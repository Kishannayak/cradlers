# Test environment: MongoDB + Backend + Frontend
# Run: docker compose -f docker-compose.test.yml up --build
# Frontend: http://localhost:3000  |  Backend API: http://localhost:8000

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - cradlers-mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/cradlers
      JWT_SECRET: test-jwt-secret-change-in-production
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://admin.localhost:3000,http://vendor.localhost:3000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  cradlers-mongo-data:
