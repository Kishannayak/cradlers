# Deploy frontend to Vercel and associate with GitHub "test" environment.
# Your live test URL will appear in GitHub: Environments → test (set Environment URL once).
#
# One-time setup:
# 1. In GitHub: Settings → Environments → New environment → name: test
# 2. In Vercel: Import this repo as a project (root = frontend), get Org ID & Project ID from settings
# 3. In Vercel: Account → Tokens → create token
# 4. In GitHub: Settings → Secrets and variables → Actions → add:
#    VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, BACKEND_URL (your Render API URL)

name: Deploy to Vercel (test)

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
