server:
  port: 8000

spring:
  application:
    name: cradlers-backend
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/cradlers
      database: cradlers
      # For MongoDB Atlas (cloud), use:
      # uri: mongodb+srv://username:password@cluster.mongodb.net/cradlers

jwt:
  secret: your-secret-key-change-this-in-production-use-a-long-random-string
  expiration: 86400000

cors:
  # Main app + admin and vendor subdomains (use port 3000 when running Next.js dev)
  allowed-origins: http://localhost:3000,http://admin.localhost:3000,http://vendor.localhost:3000

# Bootstrap admin/vendor phone numbers (comma-separated). These users get the role on login.
app:
  bootstrap-admin-phones: "+918748021561"
  bootstrap-vendor-phones: "+919880832916"

logging:
  level:
    com.cradlers: DEBUG
    org.springframework.web: INFO
