# Server Configuration
server.port=8000

# Application Name
spring.application.name=cradlers-backend

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/cradlers
spring.data.mongodb.database=cradlers
# For MongoDB Atlas (cloud), use:
# spring.data.mongodb.uri=mongodb+srv://username:password@cluster.mongodb.net/cradlers

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-use-a-long-random-string
jwt.expiration=86400000

# CORS Configuration (include doctor portal for Phase 2)
cors.allowed-origins=http://localhost:3000,http://admin.localhost:3000,http://vendor.localhost:3000,http://doctor.localhost:3000

# Bootstrap: comma-separated phone numbers that get DOCTOR role when logging in from doctor portal
app.bootstrap-doctor-phones=+14156509693

# Logging
logging.level.com.cradlers=DEBUG
logging.level.org.springframework.web=INFO

