# Render Blueprint - optional one-click backend deploy
# In Render: New → Blueprint → connect repo; set env vars in dashboard
services:
  - type: web
    name: cradlers-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
